# XcodeGen project spec for the PharosVPN iOS app (Caravel).
#
# Generate the .xcodeproj with:   cd app && xcodegen   (brew install xcodegen)
# Then open Caravel.xcodeproj in Xcode, set your Team (DEVELOPMENT_TEAM), and
# build to a device. See ../BUILD.md.
#
# Two targets:
#   Caravel  — the SwiftUI app (UI, profile store, cloud sync, the map).
#   Tunnel   — the NEPacketTunnelProvider network extension that runs the Go
#              engine over the utun. Embedded into the app.
#
# The shared Go engine ships as Caravel.xcframework (built by the human in the
# caravel repo: `./build-bindings.sh ios` → caravel/dist/Caravel.xcframework, then
# copied to ./Frameworks/Caravel.xcframework). It is linked only when present, so
# this project generates + builds the UI/extension even before the framework lands
# (CaravelCore guards every engine call with #if canImport(Caravel)). See NOTES.md.
name: Caravel

options:
  bundleIdPrefix: org.pharosvpn
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

# Apple Developer Team. Set to the project owner's team so `xcodegen` regen no
# longer wipes it (a Team ID is an opaque, non-secret identifier — it's embedded
# in every signed build anyway; it is NOT your name). Fork? Change it to yours
# (or override in Xcode → Signing & Capabilities).
# Note: a device/TestFlight signing build also needs the App Group
# group.org.pharosvpn.caravel registered ONCE via Xcode (xcodebuild's
# auto-provisioning can create App IDs but NOT App Groups). See NOTES.md §5.
settings:
  base:
    DEVELOPMENT_TEAM: "NJV3R6ZFF6"   # opaque Apple Team ID (not secret, not your name)
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
    # Marketing version mirrors the repo-root ./VERSION (fleet semver convention).
    # Keep these in sync: the release/build script should pass
    #   MARKETING_VERSION=$(tr -d '[:space:]' < VERSION)
    # to xcodebuild so a build always uses the source-of-truth VERSION even if a
    # fresh `xcodegen` here lags behind. Bump with scripts/bump-version.sh.
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # The gomobile xcframework lives in ../Frameworks; link it when present.
    FRAMEWORK_SEARCH_PATHS:
      - "$(inherited)"
      - "$(PROJECT_DIR)/../Frameworks"

# Link the Go engine only if the framework has been dropped into ../Frameworks.
# (xcodegen evaluates this at generate time; if the file is absent the app still
# builds against CaravelCore's no-engine fallback.)
packages: {}

targets:
  # ───────────────────────── App ─────────────────────────
  Caravel:
    type: application
    platform: iOS
    sources:
      - path: Caravel
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.pharosvpn.caravel
        PRODUCT_NAME: PharosVPN
        INFOPLIST_FILE: Caravel/Info.plist
        CODE_SIGN_ENTITLEMENTS: Caravel/Caravel.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        # The gomobile static framework's Go runtime needs the system resolver.
        OTHER_LDFLAGS: -lresolv
    dependencies:
      - target: Tunnel
        embed: true
      - sdk: NetworkExtension.framework
      - framework: ../Frameworks/Caravel.xcframework
        embed: true
        codeSign: true

  # ──────────────── PacketTunnel extension ────────────────
  Tunnel:
    type: app-extension
    platform: iOS
    sources:
      # The extension principal class…
      - path: Tunnel
        excludes:
          - "**/.DS_Store"
      # …plus the engine seam + the shared model/store it needs (compiled into the
      # extension too; xcodegen lists the same files in both targets).
      - path: Caravel/Core/CaravelCore.swift
      - path: Caravel/Core/TunnelManager.swift
      - path: Caravel/Shared
      - path: Caravel/Model/Profiles.swift
      - path: Caravel/Model/Regions.swift
      - path: Caravel/Model/Keychain.swift
      - path: Caravel/Model/TunnelState.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.pharosvpn.caravel.tunnel
        PRODUCT_NAME: Tunnel
        INFOPLIST_FILE: Tunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tunnel/Tunnel.entitlements
        # The gomobile static framework's Go runtime needs the system resolver.
        OTHER_LDFLAGS: -lresolv
    dependencies:
      - sdk: NetworkExtension.framework
      - framework: ../Frameworks/Caravel.xcframework
        embed: false
